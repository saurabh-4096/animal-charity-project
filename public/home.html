<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws of Hope - Animal Charity</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; }

        header {
            background-color: #2c3e50;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo { color: white; font-size: 1.5rem; font-weight: bold; }

        nav ul { list-style: none; display: flex; gap: 2rem; }

        nav a { color: white; text-decoration: none; }
        nav a:hover { color: #3498db; }

        /* ✅ FIX: spacing below fixed navbar */
        .hero {
            height: 100vh;
            margin-top: 70px;
            background-image: url('https://static.vecteezy.com/system/resources/previews/005/857/332/non_2x/funny-portrait-of-cute-corgi-dog-outdoors-free-photo.jpg');
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-content {
            color: white;
            text-align: center;
        }

        .donate-btn {
            background-color: #e74c3c;
            color: white;
            padding: 1rem 3rem;
            text-decoration: none;
        }

        .section { 
            padding: 50px 20px; 
            text-align: center; 
        }

        .progress-container {
            width: 80%;
            margin: 20px auto;
            background: #ddd;
            border-radius: 10px;
        }

        .progress-bar {
            width: 0%;
            background: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 10px;
        }

        .donation-card {
            background: #f4f4f4;
            margin: 10px auto;
            padding: 10px;
            width: 60%;
            border-radius: 6px;
        }

        /* ✅ FIX: chart clean alignment */
        #donationChart {
            margin-top: 30px;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <div class="logo">Paws of Hope</div>
        <ul>
            <li><a href="about.html">About Us</a></li>
            <li><a href="impact.html">Our Impact</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="donate.html">Donate</a></li>
            <li><a href="index.html">Admin</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Every Paw Deserves Love</h1>
        <p>Help animals in need 🐾</p>
        <a href="donate.html" class="donate-btn">Donate Now</a>
    </div>
</section>

<!-- PROGRESS -->
<section class="section">
    <h2>Donation Progress</h2>
    <p id="progressText">Loading...</p>

    <div class="progress-container">
        <div id="progressBar" class="progress-bar">0%</div>
    </div>
</section>

<!-- RECENT -->
<section class="section">
    <h2>Recent Donations</h2>
    <div id="donationsList"></div>
</section>

<!-- CHART -->
<section class="section">
    <h2>Donation Chart</h2>
    <canvas id="donationChart" style="max-width:600px;margin:auto;"></canvas>
</section>

<footer>
    <p>&copy; 2025 Paws of Hope</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function loadDonations() {
    try {
        const res = await fetch("https://animal-charity-project.onrender.com/api/recent-donations");
        const data = await res.json();

        const container = document.getElementById("donationsList");
        container.innerHTML = "";

        let total = 0;
        let names = [];
        let amounts = [];

        data.forEach(d => {
            total += Number(d.amount);
            names.push(d.name);
            amounts.push(d.amount);

            const div = document.createElement("div");
            div.className = "donation-card";
            div.innerHTML = `<strong>${d.name}</strong> donated ₹${d.amount}`;
            container.appendChild(div);
        });

        let goal = 50000;
        let percent = (total / goal) * 100;

        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("progressBar").innerText = Math.floor(percent) + "%";
        document.getElementById("progressText").innerText =
            `₹${total} raised of ₹${goal}`;

        const ctx = document.getElementById('donationChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: names,
                datasets: [{
                    label: 'Donation Amount (₹)',
                    data: amounts
                }]
            }
        });

    } catch (error) {
        console.error(error);
    }
}

loadDonations();
</script>

</body>
</html>
