<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Paws of Hope</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #f9f9f9, #eef2f3);
      margin: 0;
      padding: 0;
    }

    header {
      background-color: rgba(44,62,80,0.95);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 60px;
      position: sticky;
      top: 0;
      backdrop-filter: blur(6px);
      z-index: 100;
    }

    header h1 {
      margin: 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      position: relative;
    }

    nav ul li a::after {
      content: '';
      width: 0%;
      height: 2px;
      background: #3498db;
      position: absolute;
      bottom: -4px;
      left: 0;
      transition: 0.3s;
    }

    nav ul li a:hover::after {
      width: 100%;
    }

    .contact-container {
      max-width: 600px;
      background: white;
      margin: 90px auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.8s ease;
    }

    .contact-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #e74c3c;
    }

    .contact-container label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }

    .contact-container input,
    .contact-container textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    .contact-container input:focus,
    .contact-container textarea:focus {
      border-color: #e74c3c;
      outline: none;
      box-shadow: 0 0 5px rgba(231,76,60,0.3);
    }

    .contact-container button {
      background: linear-gradient(90deg,#e74c3c,#ff7675);
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      transition: 0.3s;
    }

    .contact-container button:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg,#c0392b,#ff6b6b);
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #2c3e50;
      color: white;
      margin-top: 50px;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>
  <header>
    <h1>Paws of Hope</h1>
    <nav>
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="impact.html">Our Impact</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="donate.html">Donate</a></li>
        <li><a href="index.html">Admin</a></li>
      </ul>
    </nav>
  </header>

  <div class="contact-container">
    <h2>Contact Us 🐾</h2>

    <form id="contactForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    <p>&copy; 2025 Paws of Hope | All Rights Reserved</p>
  </footer>

  <script>
    document.getElementById("contactForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value,
      };

      try {
        const res = await fetch("https://animal-charity-project.onrender.com/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const result = await res.json();

        if (result.success) {
          alert("✅ Message sent successfully!");
          this.reset();
        } else {
          alert("❌ Error sending message. Please try again later.");
        }
      } catch (error) {
        alert("❌ Error sending message. Please check your connection.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
