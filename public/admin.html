<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#f5f5f5,#e9ecef);
    padding: 30px;
}

/* HEADER */
h1{
    color: #2c3e50;
    margin-bottom: 10px;
}

/* BACK BUTTON */
.back-home{
    margin-bottom: 20px;
}
.back-home a{
    text-decoration: none;
    color: #3498db;
    font-weight: 500;
}
.back-home a:hover{
    text-decoration: underline;
}

/* SECTION TITLES */
h2{
    margin: 20px 0 10px;
    color: #e74c3c;
}

/* TABLE DESIGN */
table{
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 40px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    animation: fadeIn 0.6s ease;
}

th, td{
    padding: 12px;
    text-align: left;
}

/* HEADER */
th{
    background: linear-gradient(90deg,#2c3e50,#34495e);
    color: white;
}

/* ROWS */
tr:nth-child(even){
    background: #f9f9f9;
}

tr:hover{
    background: #f1f1f1;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform: translateY(20px);}
    to{opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="back-home">
    <a href="home.html">← Back to Home</a>
</div>

<h1>Admin Dashboard</h1>

<h2>Contact Messages</h2>
<table id="contactsTable">
<tr>
<th>Name</th>
<th>Email</th>
<th>Message</th>
</tr>
</table>

<h2>Donations</h2>
<table id="donationsTable">
<tr>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
<th>Message</th>
</tr>
</table>

<script>
async function loadContacts() {
    try {
        const res = await fetch("https://animal-charity-project.onrender.com/api/admin/contacts");
        const data = await res.json();

        const table = document.getElementById("contactsTable");

        data.forEach(c => {
            const row = table.insertRow();
            row.insertCell(0).innerText = c.name || "";
            row.insertCell(1).innerText = c.email || "";
            row.insertCell(2).innerText = c.message || "";
        });
    } catch (error) {
        console.error("Error loading contacts:", error);
        alert("Failed to load contacts");
    }
}

async function loadDonations() {
    try {
        const res = await fetch("https://animal-charity-project.onrender.com/api/admin/donations");
        const data = await res.json();

        const table = document.getElementById("donationsTable");

        data.forEach(d => {
            const row = table.insertRow();
            row.insertCell(0).innerText = d.name || "";
            row.insertCell(1).innerText = d.email || "";
            row.insertCell(2).innerText = d.amount || "";
            row.insertCell(3).innerText = d.message || "";
        });
    } catch (error) {
        console.error("Error loading donations:", error);
        alert("Failed to load donations");
    }
}

loadContacts();
loadDonations();
</script>

</body>
</html>
