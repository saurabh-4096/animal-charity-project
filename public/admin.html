<script>

async function loadContacts() {
    const res = await fetch("/api/admin/contacts");
    const data = await res.json();

    const table = document.getElementById("contactsTable");

    data.forEach(c => {
        const row = table.insertRow();
        row.insertCell(0).innerText = c.name;
        row.insertCell(1).innerText = c.email;
        row.insertCell(2).innerText = c.message;
    });
}

async function loadDonations() {
    const res = await fetch("/api/admin/donations");
    const data = await res.json();

    const table = document.getElementById("donationsTable");

    data.forEach(d => {
        const row = table.insertRow();
        row.insertCell(0).innerText = d.name;
        row.insertCell(1).innerText = d.email;
        row.insertCell(2).innerText = d.amount;
        row.insertCell(3).innerText = d.message;
    });
}

loadContacts();
loadDonations();

</script>
